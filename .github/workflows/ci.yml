name: CI with E2E

on: [push, pull_request]  # Run this workflow on push and pull requests

jobs:
  test:
    runs-on: ${{ matrix.os}}
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version}}
      - name: Show Python Version
        run: |
          python --version
          echo "OS: ${{ matrix.os}}
        
    
